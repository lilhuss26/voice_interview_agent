name: tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # agent/config/llm.py builds ChatAnthropic at import time and it rejects
      # a null api_key. conftest.py seeds this too; repeated here so the reason
      # is visible to anyone reading the workflow.
      ANTHROPIC_API_KEY: test-key
      # Tripwire: if the lazy-Whisper load in src/api/services/voice.py ever
      # regresses, the suite fails fast instead of quietly downloading ~150MB
      # of weights on every run.
      HF_HUB_OFFLINE: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirments.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirments.txt

      - name: Run tests
        run: pytest
